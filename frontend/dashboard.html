<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Supermercado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body class="bg-soft">
  <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand text-primary fw-bold" href="dashboard.html">Supermercado Api</a>
      <button class="btn btn-outline-secondary" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <main class="container py-4">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3 mb-4">
      <div>
        <h1 class="h3 text-primary">Gestión de productos</h1>
      </div>
      <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal" onclick="openProductModal()">Nuevo producto</button>
    </div>

    <div class="card card-soft shadow-sm border-0 p-4 mb-4">
      <div class="row g-3">
        <div class="col-md-4">
          <input id="filterName" type="search" class="form-control" placeholder="Buscar por nombre" oninput="applyFilters()" />
        </div>
        <div class="col-md-3">
          <select id="filterCategory" class="form-select" onchange="applyFilters()">
            <option value="">Todas las subcategorías</option>
            <option value="cereales">Cereales</option>
            <option value="endulzantes">Endulzantes</option>
            <option value="bebidas">Bebidas</option>
            <option value="panadería">Panadería</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="filterStatus" class="form-select" onchange="applyFilters()">
            <option value="">Todos los estados</option>
            <option value="activo">Activo</option>
            <option value="inactivo">Inactivo</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-primary w-100" onclick="resetFilters()">Limpiar</button>
        </div>
      </div>
    </div>

    <div id="tableError" class="alert alert-danger d-none"></div>

    <div class="table-responsive mb-3">
      <table class="table table-hover align-middle bg-white shadow-sm rounded-4" id="productTable">
        <thead class="table-light">
          <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Subcategoría</th>
            <th>Precio</th>
            <th>Precio x cantidad</th>
            <th>Estado</th>
            <th class="text-end">Acciones</th>
          </tr>
        </thead>
        <tbody id="productBody"></tbody>
      </table>
    </div>

    <div class="d-flex justify-content-between align-items-center">
      <div id="paginationInfo" class="text-muted"></div>
    </div>
  </main>

  <div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content border-0 shadow-sm">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="modalTitle">Crear producto</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body">
          <div id="formError" class="alert alert-danger d-none"></div>
          <form id="productForm" onsubmit="saveProduct(event)">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input id="productNombre" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Subcategoría</label>
                <input id="productSubcategoria" class="form-control" placeholder="cereales, bebidas..." required />
              </div>
              <div class="col-12">
                <label class="form-label">Descripción</label>
                <textarea id="productDescripcion" rows="2" class="form-control" required></textarea>
              </div>
              <div class="col-md-4">
                <label class="form-label">Precio</label>
                <input id="productPrecio" type="number" min="1" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Precio x cantidad</label>
                <input id="productPrecioCantidad" type="number" min="1" class="form-control" required />
              </div>
              <div class="col-md-4">
                <label class="form-label">Estado</label>
                <select id="productEstado" class="form-select" required>
                  <option value="activo">Activo</option>
                  <option value="inactivo">Inactivo</option>
                </select>
              </div>
            </div>
            <div class="mt-4 text-end">
              <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
