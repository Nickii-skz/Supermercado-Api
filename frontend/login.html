<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Supermercado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body class="bg-soft d-flex align-items-center min-vh-100">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card card-soft shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="h4 text-center text-primary mb-3">Acceso al Panel</h2>

            <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

            <form id="loginForm" onsubmit="submitLogin(event)">
              <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input id="usuario" type="text" class="form-control" placeholder="admin" required />
              </div>
              <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <input id="password" type="password" class="form-control" placeholder="admin123" required />
              </div>
              <button type="submit" class="btn btn-primary w-100">Iniciar sesión</button>
            </form>

            <div class="text-center mt-4 text-muted">
              admin / admin123 · estudiante / est2025 · inactivo / noactivo1
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
